<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Tracker</title>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Tangerine:wght@400;700&display=swap');
      input,select{
        background-color: #e1ed9f;
        border: 2px solid #35d335;
        border-radius: 10px;
        padding: 10px;
        box-shadow: 0 2px 6px rgba(3, 96, 69, 0.1);
      }
      #addButton{
        background-color: #12690c;
        color: white;
        border: none;
        border-radius: 8px;
        padding: 8px 16px;
        cursor: pointer;

      }
      body{
      font-family: "Tangerine", cursive;
      font-weight: 800;
       font-style: bold;
        font-size: x-large;
       background-color: beige;

        margin: 0;
        display: flex;
        justify-content:center;
        align-items: center;
        height: 100vh;

        background-image: url(Bg.png);
        

      }

      #taskList{
        font-size: x-large;
        font-style:bold;
        font-weight:800;
        color: #12690c;

      }

      button{
        margin-top : 10px;
      }
      #box{
        border: 1px solid black;
        border-radius: 10px;
        padding: 50px;
        background-color:beige;
        box-shadow: 0 10px 25px rgba(0,0,0,0.2);
      }

      h1{
        padding-bottom: 5px;
        display:flex;
        justify-content: center;
        color:darkgreen;
        border: 2px solid darkgreen;
        border-radius: 10px;
        padding-top: 5px;
        padding-left: 0;
        font-weight: 50px;
        text-shadow: #35d335;
        text-decoration:dotted;
        text-decoration-line: underline;
        text-decoration-thickness: 2px;
        background-color: beige;
      }
      li{
        font-family:'Times New Roman', Times, serif;
        font-size:large;
        cursor: pointer;
           cursor: grab;
      }
      #delete{
        border: 1px solid red;
        border-radius: 50%;
        background-color: beige;
        color:red;
        font-weight: bold;
        margin-left: 5px;
        cursor:pointer;
      }
      p{
        word-wrap: break-word;
        overflow-wrap: break-word;
        font-style: italic;
      
      }
      #container{
        display:flex;
        text-align: center;
        justify-content: center;
        align-items: center;
        align-content: center;
       
      }
      .note {
      display: flex;
      align-items: flex-start;
      font-family: 'Rancho', cursive;
      font-size: 15px;
      font-weight: 400;
      opacity: 1;
      border: black;
    }

      .label {
      margin-right: 5px;
  }

       .text {
      display: inline-block;
      }
      .note-box {
        background-color: #e6ecc2;
        border-left: 4px solid #6b8e23;
        border-right: 4px solid #6b8e23;
        border-radius: 8px;
        padding: 12px 16px;
        margin-top: 20px;
        width: fit-content;
      }
    </style>
</head>
<body>
  <div class="container">
    <h1 > Task Tracker </h1>
    <div id = "box">
      <h3><label for="user">Select the username</label></h3>
    <input id="user" type = "text" name="user"><br>
    <h3><label for="taskInput">Enter the task name:</label></h3>
    <input id="taskInput" type="text"
    name="taskInput"><br>
    
    <button id="addButton"
        type="button">Add</button><br>


   <div class="note-box">
  <p class="note">
    <span class="label">NOTE:</span>
    <span class="text">
      Mark tasks as complete by clicking them, or <br>
      delete them using the cross button.
    </span>
  </p>
</div>
    <ul id="taskList"></ul>
</div>
</div>
    </body>
    <script>
      const taskInput= document.getElementById
      ("taskInput");
      const user = document.getElementById
      ("user");
      const addButton = document.getElementById
      ("addButton");
      const taskList = document.getElementById
      ("taskList");

        let tasks = [];

      addButton.addEventListener('click',function(){
        let task = taskInput.value;
        let addedBy = user.value;

       if (task == "") {
      alert("Enter the task!");
      return;
    }
        let newTask = { 
          text: task,
          addedBy: addedBy,
          status: "pending",
        };

         tasks.push(newTask);
          taskInput.value = "";
         renderTasks();

        function renderTasks(){
          taskList.innerHTML = "";

          tasks.forEach((task, index) =>{
              let li = document.createElement("li");
              let checked = document.createElement("input");
              checked.setAttribute("type", "checkbox");
              li.textContent = `${task.text}(${task.addedBy})`;
              

                //Completed Toggle function
                li.addEventListener("click", function(){
                  tasks[index].completed = !tasks[index].completed;
                  renderTasks();
                })
                if(task.completed){
                  li.style.textDecoration = "line-through";
                }
                //Delete Button
                let delBtn = document.createElement("button");
                delBtn.id = 'delete';
                delBtn.textContent = "X";

                delBtn.addEventListener("click", function(e){
                  e.stopPropagation();
                  tasks.splice(index, 1);
                  renderTasks();
                });
                li.appendChild(delBtn);
              taskList.appendChild(li);
          });
          localStorage.setItem("tasks", JSON.stringify(tasks)); 
        }


      });

    </script>

</body>
</html>
