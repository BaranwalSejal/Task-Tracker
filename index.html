<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Tracker</title>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Tangerine:wght@400;700&display=swap');
      input,select{
        background-color: #e1ed9f;
        border: 2px solid #35d335;
        border-radius: 10px;
        padding: 10px;
        box-shadow: 0 2px 6px rgba(3, 96, 69, 0.1);
      }
      #addButton{
        background-color: #12690c;
        color: white;
        border: none;
        border-radius: 8px;
        padding: 8px 16px;
        cursor: pointer;
      }
      body{
      font-family: "Tangerine", cursive;
      font-weight: 800;
       font-style: bold;
        font-size: x-large;
       background-color: beige;

        margin: 0;
        display: flex;
        justify-content:center;
        align-items: center;
        height: 100vh;

      }

      #taskList{
        font-size: x-large;
        font-style:bold;
        font-weight:800;
        color: #12690c;

      }
    </style>
</head>
<body>
  <div class="container">
    <h3><label for="taskInput">Enter the task name:</label></h3>
    <input id="taskInput" type="text"
    name="taskInput"><br>
    <h1><label for="user">Select the username</label></h1>

    <h3><select id="user">
        <option value="" disabled selected hidden>Select User</option>
       <h3> <option value="Sejal">Sejal</option></h3>
    <h3><option value="Aryan">Aryan</option></select></h3>
    <br>
    <button id="addButton"
        type="button">Add</button><br>
    <ul id="taskList"></ul>
    </div>
    <script>
      const taskInput= document.getElementById
      ("taskInput");
      const user = document.getElementById
      ("user");
      const addButton = document.getElementById
      ("addButton");
      const taskList = document.getElementById
      ("taskList");

        let tasks = [];

      addButton.addEventListener('click',function(){
        let task = taskInput.value;
        let addedBy = user.value;

       if (task == "") {
      alert("Enter the task!");
      return;
    }
        let newTask = { 
          text: task,
          addedBy: addedBy,
          status: "pending"
        };

         tasks.push(newTask);
          taskInput.value = "";
         renderTasks();

        function renderTasks(){
          taskList.innerHTML = "";

          tasks.forEach((task, index) =>{
              let li = document.createElement("li");
              li.textContent = `${task.text}(${task.addedBy}) - $`;

                //Completed Toggle function
                li.addEventListener("click", function(){
                  tasks[index].completed = !tasks[index].completed;
                  renderTasks();
                })
                if(task.completed ){
                  li.style.textDecoration = "line-through";
                }
                //Delete Button
                let delBtn = document.createElement("button");
                delBtn.textContent = " X";

                delBtn.addEventListener("click", function(e){
                  e.stopPropagation();
                  tasks.splice(index, 1);
                  renderTasks();
                });
                li.appendChild(delBtn);
              taskList.appendChild(li);

          });
        }


      });

    </script>

</body>
</html>
